category: Analytics & SIEM
commonfields:
  id: Vega
  version: -1
sectionorder:
  - Connect
  - Collect
  - Vega Entities
  - Alerts
  - Incidents
configuration:
  - display: Base URL
    additionalinfo: The Base URL of the Vega API.
    name: url
    required: true
    type: 0
    section: Connect
  - display: Access Key ID
    additionalinfo: The Access Key ID used to authenticate with the Vega API.
    name: access_key_id
    required: true
    type: 4
    section: Connect
  - display: Access Key
    additionalinfo: The Access Key used to authenticate with the Vega API.
    name: access_key
    required: true
    type: 4
    section: Connect
  - display: Fetch incidents
    name: isFetch
    type: 8
    section: Collect
    required: false
    defaultvalue: "true"
    hidden: true
  - name: incidentFetchInterval
    type: 19
    display: Incidents Fetch Interval
    defaultvalue: "5"
    required: true
  - display: Vega Entities to fetch
    additionalinfo: Select the Vega entities to fetch as XSOAR incidents.
    name: vega_entities
    type: 16
    section: Vega Entities
    required: true
    options:
      - Alerts
      - Incidents
    defaultvalue: Alerts,Incidents
    additionalinfo: >-
      Number of days before today to fetch alerts and incidents on the first run.
      Use 0 for today only. Valid range is 0–365.
    name: backfill_history
    type: 1
    section: Vega Entities
    required: true
    defaultvalue: "365"
  - display: Alert Severities to fetch
    additionalinfo: Filter alerts by severity. If empty, all severities are fetched.
    name: alert_severities
    type: 16
    section: Alerts
    required: false
    options:
      - LOW
      - MEDIUM
      - HIGH
      - CRITICAL
    defaultvalue: LOW,MEDIUM,HIGH,CRITICAL
  - display: Alert Statuses to fetch
    additionalinfo: Filter alerts by status. If empty, all statuses are fetched.
    name: alert_statuses
    type: 16
    section: Alerts
    required: false
    options:
      - OPEN
      - IN_PROGRESS
      - PEER_REVIEW
      - RESOLVED
    defaultvalue: OPEN,IN_PROGRESS,PEER_REVIEW,RESOLVED
  - display: Alert Verdicts to fetch
    additionalinfo: Filter alerts by verdict. If empty, all verdicts are fetched.
    name: alert_verdicts
    type: 16
    section: Alerts
    required: false
    options:
      - MALICIOUS
      - SUSPICIOUS
      - BENIGN
      - INCONCLUSIVE
      - NA
    defaultvalue: MALICIOUS,SUSPICIOUS,BENIGN,INCONCLUSIVE,NA
  - display: Incident Severities to fetch
    additionalinfo: Filter incidents by severity. If empty, all severities are fetched.
    name: incident_severities
    type: 16
    section: Incidents
    required: false
    options:
      - LOW
      - MEDIUM
      - HIGH
      - CRITICAL
    defaultvalue: LOW,MEDIUM,HIGH,CRITICAL
  - display: Incident Statuses to fetch
    additionalinfo: Filter incidents by status. If empty, all statuses are fetched.
    name: incident_statuses
    type: 16
    section: Incidents
    required: false
    options:
      - NEW
      - INVESTIGATING
      - ON_HOLD
      - EXTERNAL_ESCALATION
      - RESOLVED
      - REOPENED
      - REVIEW_RECOMMENDED
      - RESPONSE_REQUIRED
      - UNDER_REVIEW
    defaultvalue: NEW,INVESTIGATING,ON_HOLD,EXTERNAL_ESCALATION,RESOLVED,REOPENED,REVIEW_RECOMMENDED,RESPONSE_REQUIRED,UNDER_REVIEW
  - display: Incident Verdicts to fetch
    additionalinfo: Filter incidents by verdict. If empty, all verdicts are fetched.
    name: incident_verdicts
    type: 16
    section: Incidents
    required: false
    options:
      - MALICIOUS
      - SUSPICIOUS
      - BENIGN
      - INCONCLUSIVE
      - NA
    defaultvalue: MALICIOUS,SUSPICIOUS,BENIGN,INCONCLUSIVE,NA
  - display: Incident type
    name: incidentType
    type: 13
    section: Connect
    required: false
  - display: Trust any certificate (not secure)
    name: insecure
    required: false
    type: 8
    section: Connect
    advanced: true
  - display: Use system proxy settings
    name: proxy
    required: false
    type: 8
    section: Connect
    advanced: true
defaultclassifier: Vega Classifier
defaultmapperin: Vega Mapper
description: Vega integration for fetching alerts and incidents from the Vega platform.
display: Vega
name: Vega
script:
  commands: []
  isfetch: true
  runonce: false
  script: "-"
  type: python
  subtype: python3
  dockerimage: demisto/python3:3.12.8.3296088
fromversion: 6.10.0
marketplaces:
  - xsoar
  - marketplacev2
tests:
  - No tests (auto formatted)
